<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    New Chat
                </button>
            </div>
            <div class="sidebar-history" id="chat-history">
                <!-- Chat history items populated by JS -->
            </div>
            <div class="sidebar-footer">
                <button class="debug-toggle-btn" id="debug-toggle-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span id="debug-toggle-label">Debug: OFF</span>
                </button>
            </div>
        </aside>

        <!-- Main chat area -->
        <main class="chat-main">
            <div class="chat-header">
                <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <h1 class="chat-title">Agent Chat</h1>
                <span class="debug-indicator" id="debug-indicator" style="display:none;">DEBUG MODE</span>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message">
                    <h2>How can I help you today?</h2>
                    <p>Send a message to get started.</p>
                </div>
            </div>

            <!-- Debug decision panel (hidden by default) -->
            <div class="debug-panel" id="debug-panel" style="display:none;">
                <div class="debug-panel-header">
                    <h3>Decision Required</h3>
                    <p class="debug-prompt" id="debug-prompt"></p>
                </div>
                <div class="debug-fields">
                    <label for="debug-tool">Tool:</label>
                    <input type="text" id="debug-tool" placeholder="e.g. deploy_cluster, done, fail" />

                    <label for="debug-reason">Reason:</label>
                    <input type="text" id="debug-reason" placeholder="Why this tool?" />

                    <label for="debug-params">Parameters (JSON):</label>
                    <textarea id="debug-params" rows="3" placeholder='{"key": "value"}'>{}</textarea>

                    <button class="debug-submit-btn" id="debug-submit-btn">Submit Decision</button>
                </div>
            </div>

            <div class="chat-input-container">
                <form class="chat-input-form" id="chat-form">
                    <div class="input-wrapper">
                        <textarea
                            id="chat-input"
                            placeholder="Message Agent Chat..."
                            rows="1"
                            aria-label="Chat message input"
                        ></textarea>
                        <button type="submit" class="send-btn" id="send-btn" aria-label="Send message" disabled>
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M10 18V2M10 2L4 8M10 2l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
